version: '3.8'

services:
  vrcx-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrcx-server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DataDirectory=/app/data
      - Logging__LogLevel__Default=Information
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vrcx-data:
    driver: local
